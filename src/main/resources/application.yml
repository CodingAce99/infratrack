# Common configuration for all profiles

spring:
  application:
    name: infratrack
  
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate  # Validar esquema, no modificar
    properties:
      hibernate:
        format_sql: true
  
  # Enable Virtual Threads (Java 21 feature)
  threads:
    virtual:
      enabled: true

  # Flyway configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  compression:
    enabled: true
  error:
    include-message: always
    include-stacktrace: on_param

logging:
  level:
    root: INFO
    com.infratrack: DEBUG

management:
  endpoints:
    web:
      exposure:
        # Only expose what we need. Default is only "health"; "prometheus" is
        # added for scraping, "info" for build metadata. Everything else (env,
        # beans, heapdump) stays off — no accidental secret leak via /actuator/env.
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        # Enables /actuator/health/liveness and /actuator/health/readiness.
        # The Docker healthcheck uses /actuator/health (parent) which still works.
        enabled: true
      show-details: always
  metrics:
    tags:
      # Adds application="infratrack" to every metric emitted by this instance.
      # When multiple services report to one Prometheus, this tag lets you filter.
      application: ${spring.application.name}

# Custom application properties
infratrack:
  encryption:
    key: ${INFRATRACK_ENCRYPTION_KEY}
  security:
    encryption:
      enabled: true
  ssh:
    connection:
      timeout-seconds: 30
  monitoring:
    interval-seconds: 60
